<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Expense Tracker</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container-fluid py-5">
        <!-- Header -->
        <div class="row mb-5">
            <div class="col-12 text-center">
                <h1 class="display-4 fw-bold mb-3">
                    <i class="bi bi-wallet2 text-primary"></i>
                    Personal Expense Tracker
                </h1>
                <p class="lead text-muted">Track and manage your expenses effortlessly</p>
            </div>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-10">
                <!-- Total Expenses Card -->
                <div class="row mb-4">
                    <div class="col-12">
                        <div class="card total-card text-center">
                            <div class="card-body">
                                <h2 class="mb-1" id="totalAmount">$0.00</h2>
                                <p class="mb-0">Total Expenses</p>
                                <span class="badge bg-secondary fs-6" id="expenseCount">0 expenses</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Add Expense Form -->
                <div class="row mb-4">
                    <div class="col-12">
                        <div class="card shadow-sm">
                            <div class="card-header bg-primary text-white">
                                <h5 class="mb-0">
                                    <i class="bi bi-plus-circle-fill"></i> Add New Expense
                                </h5>
                            </div>
                            <div class="card-body">
                                <form id="expenseForm">
                                    <div class="row g-3">
                                        <div class="col-md-4">
                                            <label class="form-label">Expense Name *</label>
                                            <input type="text" class="form-control" id="expenseName" required>
                                        </div>
                                        <div class="col-md-3">
                                            <label class="form-label">Amount ($)*</label>
                                            <input type="number" class="form-control" id="expenseAmount" min="0.01" step="0.01" required>
                                        </div>
                                        <div class="col-md-3">
                                            <label class="form-label">Category *</label>
                                            <select class="form-select" id="expenseCategory" required>
                                                <option value="">Select Category</option>
                                                <option value="Food">🍔 Food</option>
                                                <option value="Travel">✈️ Travel</option>
                                                <option value="Shopping">🛍️ Shopping</option>
                                                <option value="Others">📋 Others</option>
                                            </select>
                                        </div>
                                        <div class="col-md-2">
                                            <label class="form-label">Date *</label>
                                            <input type="date" class="form-control" id="expenseDate" required>
                                        </div>
                                    </div>
                                    <div class="mt-4">
                                        <button type="submit" class="btn btn-primary btn-lg px-4">
                                            <i class="bi bi-plus-lg"></i> Add Expense
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Filter Section -->
                <div class="row mb-4">
                    <div class="col-md-6">
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-funnel"></i>
                            </span>
                            <select class="form-select" id="filterCategory">
                                <option value="">All Categories</option>
                                <option value="Food">🍔 Food</option>
                                <option value="Travel">✈️ Travel</option>
                                <option value="Shopping">🛍️ Shopping</option>
                                <option value="Others">📋 Others</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-md-6 text-end">
                        <button class="btn btn-outline-secondary" id="clearFilter">
                            <i class="bi bi-arrow-clockwise"></i> Clear Filter
                        </button>
                        <button class="btn btn-outline-danger ms-2" id="clearAll">
                            <i class="bi bi-trash3"></i> Clear All
                        </button>
                    </div>
                </div>

                <!-- Expenses Table -->
                <div class="card shadow-sm">
                    <div class="card-header bg-success text-white d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">
                            <i class="bi bi-list-check"></i> Expenses List
                        </h5>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover mb-0">
                                <thead class="table-dark">
                                    <tr>
                                        <th>Date</th>
                                        <th>Name</th>
                                        <th>Category</th>
                                        <th>Amount</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="expenseTableBody">
                                    <!-- Expenses will be dynamically inserted here -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- No expenses message -->
                <div id="noExpenses" class="text-center py-5 text-muted d-none">
                    <i class="bi bi-inbox display-4 mb-3 opacity-75"></i>
                    <h5>No expenses added yet</h5>
                    <p class="mb-0">Start tracking your expenses!</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- Custom JS -->
    <script src="script.js"></script>
</body>
</html>
